[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Libraries needed for Wi-Fi, HTTP communication (Gemini API), and a display driver
; Using TFT_eSPI for better compatibility with common Wokwi displays (like ST7735/ST7789)
lib_deps =
    WiFi
    HTTPClient
    TFT_eSPI
    ${build.arduino.default.lib_deps}

monitor_speed = 115200

build_flags =
    -D GEMINI_API_KEY=\"YOUR_GEMINI_API_KEY\"
    -D GEMINI_API_URL=\"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=%s\"

